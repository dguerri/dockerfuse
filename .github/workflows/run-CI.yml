name: "CI"

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Static code analysis
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false
          cache-key: "1.25.x"

  ci:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        go: ["1.24.x", "1.25.x", "1.26.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Go vet
        run: go vet ./...

      - name: Make all
        run: make all

      - name: Unit tests
        run: go test ./...
